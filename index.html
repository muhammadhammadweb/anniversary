<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anniversary - A4 Print</title>
<style>
  @page {
    size: A4;
    margin: 10mm;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f0f0f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0;
  }

  /* Toolbar - hidden on print */
  .toolbar {
    margin-top: 20px;
    text-align: center;
  }

  .print-btn {
    background: #d64550;
    color: white;
    border: none;
    padding: 12px 28px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    transition: transform 0.15s ease, background 0.15s ease;
  }

  .print-btn:hover {
    background: #b8373f;
    transform: translateY(-2px);
  }

  .hint {
    margin-top: 8px;
    color: #666;
    font-size: 13px;
  }

  /* A4 Page */
  .page {
    width: 210mm;
    height: 297mm;
    background: white;
    box-shadow: 0 0 20px rgba(0,0,0,0.2);
    padding: 10mm;
    overflow: hidden;
    page-break-after: avoid;
    page-break-inside: avoid;
    display: flex;
    flex-direction: column;
    gap: 5mm;
  }

  /* Top: 9 small passport-size photos (couple) */
  .small-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 4mm;
    width: 100%;
    flex: 2;
    min-height: 0;
    overflow: hidden;
  }

  /* Bottom: 7 large standard-size photos (family) — 4 columns x 2 rows */
  .big-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 4mm;
    width: 100%;
    flex: 5;
    min-height: 0;
    overflow: hidden;
  }

  .small-grid > div,
  .big-grid > div {
    min-width: 0;
    min-height: 0;
    overflow: hidden;
    border-radius: 3mm;
  }

  .small-grid img,
  .big-grid img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    background: #eee; /* shows if image fails to load */
  }

  /* Print rules */
  @media print {
    html, body {
      background: white;
      padding: 0;
      margin: 0;
      width: 210mm;
      height: 297mm;
    }
    .toolbar {
      display: none;
    }
    .page {
      box-shadow: none;
      width: 210mm;
      height: 297mm;
      margin: 0;
    }
  }
</style>
</head>
<body>

  <div class="page">

    <!-- COUPLE PHOTOS - small, passport size (9 images) -->
    <div class="small-grid">
      <div><img src="./assets/img2.jpeg"></div>
      <div><img src="./assets/img3.jpeg"></div>
      <div><img src="./assets/img4.jpeg"></div>
      <div><img src="./assets/img5.jpeg"></div>
      <div><img src="./assets/img6.jpeg"></div>
      <div><img src="./assets/img7.jpeg"></div>
      <div><img src="./assets/img9.jpeg"></div>
      <div><img src="./assets/img15.jpeg"></div>
      <div><img src="./assets/img16.jpeg"></div>
    </div>

    <!-- FAMILY PHOTOS - large, standard 4x6 size (7 images) -->
    <div class="big-grid">
      <div><img src="./assets/family1.jpeg"></div>
      <div><img src="./assets/family2.jpeg"></div>
      <div><img src="./assets/family3.jpeg"></div>
      <div><img src="./assets/family4.jpeg"></div>
      <div><img src="./assets/family5.jpeg"></div>
      <div><img src="./assets/family6.jpeg"></div>
      <div><img src="./assets/family7.jpeg"></div>
    </div>

  </div>

  <div class="toolbar">
    <button class="print-btn" onclick="window.print()">🖨️ Print A4 Page</button>
    <div class="hint">Click karke print dialog kholo — Paper size: A4, Margins: None, Background graphics: ON</div>
  </div>

</body>
</html>
