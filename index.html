<!DOCTYPE html>
<html>
<head>
<style>
  @page { size: A4; margin: 10mm; }
  body { margin: 0; }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 5mm;
    width: 190mm;
    height: 277mm;
  }
  .grid img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
</style>
</head>
<body>
  <div class="grid">
    <img src="">
    <img src="img2.jpg">
    <!-- ... total 16 images -->
  </div>
</body>
</html>
