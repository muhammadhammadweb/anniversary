<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anniversary - A4 Print</title>
<style>
  @page {
    size: A4;
    margin: 10mm;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f0f0f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0;
  }

  /* Toolbar - hidden on print */
  .toolbar {
    margin-bottom: 20px;
    text-align: center;
  }

  .print-btn {
    background: #d64550;
    color: white;
    border: none;
    padding: 12px 28px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    transition: transform 0.15s ease, background 0.15s ease;
  }

  .print-btn:hover {
    background: #b8373f;
    transform: translateY(-2px);
  }

  .hint {
    margin-top: 8px;
    color: #666;
    font-size: 13px;
  }

  /* A4 Page */
  .page {
    width: 210mm;
    height: 297mm;
    background: white;
    box-shadow: 0 0 20px rgba(0,0,0,0.2);
    padding: 10mm;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: 1fr 1fr 2fr 2fr;
    gap: 4mm;
    width: 100%;
    height: 100%;
  }

  .grid img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 3mm;
    display: block;
    background: #eee; /* shows if image fails to load */
  }

  /* Print rules */
  @media print {
    body {
      background: white;
      padding: 0;
    }
    .toolbar {
      display: none;
    }
    .page {
      box-shadow: none;
      width: auto;
      height: auto;
      padding: 0;
    }
  }
</style>
</head>
<body>

  <div class="toolbar">
    <button class="print-btn" onclick="window.print()">🖨️ Print A4 Page</button>
    <div class="hint">Click karke print dialog kholo — Paper size: A4, Margins: None, Background graphics: ON</div>
  </div>

  <div class="page">
    <div class="grid">
      <!-- 8 chhoti images -->
      <img src="./assets/img1.jpeg">
      <img src="./assets/img2.jpeg">
      <img src="./assets/img3.jpeg">
      <img src="./assets/img4.jpeg">
      <img src="./assets/img5.jpeg">
      <img src="./assets/img6.jpeg">
      <img src="./assets/img7.jpeg">
      <img src="./assets/img8.jpeg">

      <!-- 8 badi images -->
      <img src="./assets/img9.jpeg">
      <img src="./assets/img10.jpeg">
      <img src="./assets/img11.jpeg">
      <img src="./assets/img12.jpeg">
      <img src="./assets/img13.jpeg">
      <img src="./assets/img14.jpeg">
      <img src="./assets/img15.jpeg">
      <img src="./assets/img16.jpeg">
    </div>
  </div>

</body>
</html>
